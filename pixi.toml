[workspace]
preview = ["pixi-build"]
authors = [
    "Maximilian Dösch <doesch.maximilian@gmail.com>",
    "Daniel San José Pro <42489409+danielsanjosepro@users.noreply.github.com>"
]
# Added pytorch and nvidia as secondary channels to help with binary discovery
channels = ["conda-forge", "nvidia"]
name = "crisp_gym"
platforms = ["linux-64"]

[activation]
scripts = ["scripts/set_env.sh"]
# Note: I used a dynamic path that works for both environments
env = { LD_LIBRARY_PATH = "$PIXI_PROJECT_ROOT/.pixi/envs/$PIXI_ENVIRONMENT_NAME/lib:$LD_LIBRARY_PATH" }

[dependencies]
python = "3.12.*"
compilers = "*"
cmake = "*"
pkg-config = "*"
make = "*"
ninja = "*"
typing_inspect = ">=0.9.0,<0.10"
libstdcxx-ng = ">=13"
numpy = ">=2.0.0, <2.3"
pip = ">=24.0"
packaging = "<26.0"
setuptools = "<81.0.0"
ffmpeg = ">8"
libgcc-ng = ">=13.2"


[target.linux.dependencies]
libgl-devel = "*"

# --- ENVIRONMENT DEFINITIONS ---
[environments]
dev = { features = ["dev"] }
jazzy = { features = ["jazzy"] }
# The separated environments

jazzy-pi05 = { features = ["jazzy", "lerobot-pi05", "dev"] }
jazzy-groot = { features = ["jazzy", "lerobot-groot", "dev"] }

# --- SHARED FEATURES ---
[feature.dev.pypi-dependencies]
pre-commit = "*"
ruff = "*"
debugpy = ">=1.8.14,<2"
pudb = ">=2025.1.3, <2026"

[feature.jazzy]
channels = ["https://prefix.dev/robostack-jazzy"]
[feature.jazzy.dependencies]
ros-jazzy-desktop = "*"
ros-jazzy-ros2-control = "*"
ros-jazzy-ros2-controllers = "*"
colcon-common-extensions = "*"
rosdep = "*"
ros-jazzy-rmw-cyclonedds-cpp = "*"

# --- PI0.5 SPECIFIC FEATURE ---
[feature.lerobot-pi05.dependencies]
pynput = "*"

[feature.lerobot-pi05.pypi-dependencies]
lerobot = { git = "https://github.com/huggingface/lerobot", tag = "v0.4.4", extras = ["pi"] }

# --- GROOT SPECIFIC FEATURE ---

[feature.lerobot-groot.dependencies]
pynput = "*"
cuda-toolkit = "12.6.*" 
wheel = "*"

[feature.lerobot-groot.pypi-options]
# This mimics the critical 'no-build-isolation' from your pyproject
no-build-isolation = ["flash-attn"]

[feature.lerobot-groot.pypi-dependencies]
torch = ">=2.2.1,<2.8.0"
torchcodec = "==0.5.0"
torchvision = ">=0.21.0,<0.23.0"
flash-attn = ">=2.5.9,<3.0.0"
lerobot = { git = "https://github.com/huggingface/lerobot", tag = "v0.4.4", extras = ["groot", "peft"] }

# --- GLOBAL PYPI DEPS ---
[pypi-dependencies]
crisp_gym = { path = ".", editable = true }
crisp-python = { git = "https://github.com/brianchang1025/crisp_py_panda"}

[tasks]
configure = "bash scripts/configure.sh"
fix-tokenizer = { cmd = """
python -c "import json, os; p=os.path.expanduser('~/.cache/huggingface/lerobot/lerobot/eagle2hg-processor-groot-n1p5/tokenizer_config.json'); (j:=json.load(open(p))).update({'fix_mistral_regex':True}) or json.dump(j,open(p,'w'),indent=2) if os.path.exists(p) else print('Model not yet downloaded, skipping patch.')"
""" }
nvcc_ok = "nvcc --version"
torch_ok = "python -c 'import torch;print(torch.__version__, torch.version.cuda);import flash_attn_2_cuda as _;print(\"flash-attn: OK\")'"