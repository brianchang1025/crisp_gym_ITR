control_frequency: 30.0
gripper_mode: "absolute_continuous"
max_episode_steps: 1000

# NOTE: These are the defaults anyway
observations_to_include_to_state:
  - observation.state.cartesian
  - observation.state.gripper
  - observation.state.joints
  - observation.state.target

cartesian_control_param_config: null
joint_control_param_config: null     

robot_config:
  robot_type: "panda"
  time_to_home: 2.0
  publish_frequency: 50.0
  home_config:
    - 0.0
    - -0.785
    - 0.0
    - -2.355
    - 0.0
    - 1.57
    - 0.785

gripper_config:
  # Will be loaded from gripper_right.yaml via GripperConfig.from_yaml()
  from_yaml: grippers/panda_gripper.yaml

camera_configs:
  - camera_name: "primary"
    camera_frame: "primary_link"
    resolution: [256, 256]
    camera_color_image_topic: "/camera/third_person_camera/color/image_raw"
    camera_color_info_topic: "/camera/third_person_camera/color/camera_info"
  - camera_name: "wrist"
    camera_frame: "wrist_link" 
    resolution: [256, 256]
    camera_color_image_topic: "/camera/wrist_camera/color/image_raw"
    camera_color_info_topic: "/camera/wrist_camera/color/camera_info"

